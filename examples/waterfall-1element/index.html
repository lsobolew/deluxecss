<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>pixel-css — waterfall, one element (frames, no palette)</title>
<link rel="stylesheet" href="waterfall.css">
<style>
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b0f14}
  /* The whole 640×286 animation lives on this single element's background —
     286 row-gradients per frame, swapped in @keyframes (the "10m" technique).
     Colors AND the per-stop unit are inlined (--inline-palette) so the gradients
     hold no var() — that's what keeps it under Chrome's ~50k-var()-per-value
     limit and renders in both Chrome and Safari. Heavy (~20 MB); slow first paint. */
</style>
</head><body>
  <div class="pixel-image" role="img" aria-label="Monkey Island waterfall, frame-by-frame CSS animation on a single element"></div>
</body></html>
