<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>pixel-css — Stan (4-frame sprite animation)</title>
<link rel="stylesheet" href="stan.css">
<style>
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:#1a1030}
  /* Container mode: the CSS carries no scale — size the sprite with plain width
     and it fills the box via cqw/cqh. Resize the window to see it scale. */
  .pixel-image{ width: min(264px, 80vw); }
</style>
</head><body>
  <div class="pixel-image palette" role="img" aria-label="Stan the salesman, a 4-frame CSS sprite animation"><div class="pixel-image__layer"></div><div class="pixel-image__layer"></div></div>
</body></html>
